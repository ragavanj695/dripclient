{% extends 'client/base.html' %}
{% block content %}
<div class="page">
    <div class="header">
        <div class="logo-glow">DRIP</div>
        <h1>DRIP RECHARGE</h1>
        <div class="user-tag">User: {{ request.user.username|upper }}</div>
    </div>

    <div class="card">
        <div class="card-header">Step 1: Choose Credits</div>
        <form method="POST" action="{% url 'recharge' %}">
            {% csrf_token %}
            <select name="credits" required>
                <option value="">-- Select Package --</option>
                <option value="7">7 CREDITS — ₹199</option>
                <option value="15">15 CREDITS — ₹399</option>
            </select>

            <div class="card-header">Step 2: Scan & Pay</div>
            <div style="text-align:center;">
                <div class="qr-box">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHQAAAB0CAYAAABTnVpEAAAA6ElEQVR4nO3BMQEAAADCoPVPbQhfoAAAAAA4NwpQAXK8lgA=" alt="QR Code" style="width:180px;height:180px;">
                </div>
            </div>

            <div class="card-header">Step 3: Enter UTR</div>
            <input type="number" name="utr" class="utr-inp" placeholder="12-Digit UTR" maxlength="12" required>

            <button type="submit" class="btn btn-green">Submit Payment</button>
        </form>
    </div>
</div>

<nav class="bottom-nav">
    <a class="nav-btn" href="{% url 'dashboard' %}">🏠 Home</a>
    <a class="nav-btn active" href="{% url 'recharge' %}">💳 Buy</a>
    <a class="nav-btn logout" href="{% url 'logout' %}">🚪 Logout</a>
</nav>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client</title>
    <style>
        :root { --bg:#000; --card:#0d0d0d; --pink:#ff00ff; --green:#00ff00; --input:#050505; --gray:#b3b3b3; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:white; font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:20px; padding-bottom:100px; }
        .page { width:100%; max-width:500px; display:flex; flex-direction:column; align-items:center; }
        .header { text-align:center; margin-bottom:25px; margin-top:10px; width:100%; }
        .logo-glow { width:70px; height:70px; border-radius:50%; background:radial-gradient(circle,var(--pink) 0%,transparent 70%); display:flex; justify-content:center; align-items:center; margin:0 auto; box-shadow:0 0 20px var(--pink); border:1px solid var(--pink); font-weight:900; font-size:13px; color:black; }
        h1 { font-style:italic; letter-spacing:2px; margin:12px 0 4px; font-size:1.4rem; }
        .user-tag { font-size:0.65rem; color:var(--gray); text-transform:uppercase; }
        .card { width:100%; background:var(--card); border:1.5px solid var(--pink); border-radius:20px; padding:20px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.5); margin-bottom:20px; }
        .card-header { color:var(--green); text-align:left; font-style:italic; font-weight:bold; margin-bottom:15px; text-transform:uppercase; font-size:0.75rem; letter-spacing:1px; }
        .login-card { width:100%; max-width:400px; background:var(--card); border:2px solid var(--pink); border-radius:20px; padding:40px 30px; text-align:center; margin-top:80px; }
        .login-header { color:var(--pink); font-style:italic; font-weight:bold; font-size:1.5rem; margin-bottom:30px; letter-spacing:2px; }
        .inp { width:100%; padding:15px; background:var(--input); border:1px solid #222; border-radius:10px; color:white; margin-bottom:15px; font-size:1rem; outline:none; }
        .inp:focus { border-color:var(--pink); }
        .btn { width:100%; padding:15px; background:var(--pink); border:none; border-radius:10px; font-weight:900; cursor:pointer; text-transform:uppercase; font-size:1rem; color:black; transition:0.2s; }
        .btn:hover { background:#ff33ff; }
        .btn:active { transform:scale(0.97); }
        .btn-green { background:var(--green); color:black; }
        .btn-green:hover { background:#33ff33; }
        .footer-text { margin-top:20px; font-size:0.8rem; }
        .pink-link { color:var(--pink); text-decoration:none; font-weight:bold; cursor:pointer; }
        .pink-link:hover { text-decoration:underline; }
        .status-bar { display:grid; grid-template-columns:1fr 1fr 1fr; width:100%; padding:15px 5px; margin-bottom:20px; font-size:0.6rem; border-top:1px solid #222; border-bottom:1px solid #222; text-align:center; font-weight:bold; }
        .credits-box { width:100%; border:1px dashed var(--pink); border-radius:15px; padding:20px; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; background:rgba(255,0,255,0.03); }
        .credit-count { color:var(--pink); font-size:1.5rem; font-weight:900; text-shadow:0 0 10px var(--pink); }
        select { width:100%; padding:14px; background:var(--input); border:1px solid #222; color:var(--pink); border-radius:10px; margin-bottom:20px; font-size:1rem; outline:none; }
        select:focus { border-color:var(--pink); }
        .utr-inp { width:100%; padding:16px; background:var(--input); border:1px solid #222; border-radius:12px; color:white; margin-bottom:15px; font-size:1rem; text-align:center; letter-spacing:1px; }
        .utr-inp:focus { border-color:var(--green); outline:none; }
        .qr-box { background:white; padding:10px; border-radius:12px; display:inline-block; margin:20px 0; border:3px solid var(--pink); }
        .qr-box img { width:180px; height:180px; display:block; }
        .msg { margin-top:12px; font-size:0.8rem; font-weight:bold; padding:10px; border-radius:8px; background:rgba(0,0,0,0.3); }
        .err { color:#ff4444; }
        .suc { color:var(--green); }
        .key-result { margin-top:20px; padding:15px; background:#111; border-radius:10px; border-left:4px solid var(--green); }
        .key-text { display:block; word-break:break-all; color:var(--green); font-family:monospace; margin-top:5px; font-size:0.9rem; }
        .bottom-nav { position:fixed; bottom:0; left:0; width:100%; display:flex; justify-content:space-around; padding:16px 0; border-top:1.5px solid var(--pink); background:#050505; z-index:100; }
        .nav-btn { font-size:14px; color:var(--gray); text-transform:uppercase; font-weight:bold; letter-spacing:1px; cursor:pointer; background:none; border:none; text-decoration:none; display:inline-block; }
        .nav-btn:hover, .nav-btn.active { color:var(--pink); }
        .nav-btn.logout { color:#ff4444; }
        .alert-box { width:100%; max-width:400px; margin-bottom:15px; text-align:center; padding:12px 20px; border-radius:12px; font-size:0.85rem; font-weight:bold; border:1px solid #ff4444; background:#1a0a0a; color:#ff4444; }
        .alert-box.success { border-color:var(--green); color:var(--green); background:#0a1a0a; }
    </style>
</head>
<body>
{% if messages %}
    {% for message in messages %}
        <div class="alert-box {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
    {% endfor %}
{% endif %}
{% block content %}{% endblock %}
</body>
</html>
